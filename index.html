<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アニメ配信比較インデックス</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background-color: #f9f9f9;
      padding: 40px;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }
    .search-bar {
      max-width: 600px;
      margin: 0 auto 24px;
      display: flex;
      gap: 8px;
    }
    .search-bar input {
      padding: 8px;
      font-size: 1em;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .search-bar button {
      padding: 8px 16px;
      font-size: 1em;
      border-radius: 4px;
      border: none;
      background: #3498db;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-bar button:hover {
      background: #217dbb;
    }
    ul {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: 0 auto;
    }
    li {
      background: #fff;
      margin: 10px 0;
      padding: 14px 20px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: background 0.2s;
    }
    li:hover {
      background: #eaf6ff;
    }
    a {
      text-decoration: none;
      color: #2980b9;
      font-size: 1.1em;
    }
    a:hover {
      text-decoration: underline;
    }
    .result-count {
      text-align: center;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>作品配信比較</h1>
  <!-- 検索フォーム -->
  <form class="search-bar" id="search-form" onsubmit="return false;">
    <input type="text" id="search-input" placeholder="検索語（スペース区切りでAND検索）">
    <input type="text" id="exclude-input" placeholder="除外語（スペース区切り）">
    <button type="submit">検索</button>
    <button type="button" id="reset-btn">リセット</button>
  </form>
  <div class="result-count" id="result-count"></div>
  <ul id="result-list">
    <li><a href="011_a_gyo_comparison.html">ア行の作品比較</a></li>
    <li><a href="012_ka_gyo_comparison.html">カ行の作品比較</a></li>
    <li><a href="013_sa_gyo_comparison.html">サ行の作品比較</a></li>
    <li><a href="014_ta_gyo_comparison.html">タ行の作品比較</a></li>
    <li><a href="015_na_gyo_comparison.html">ナ行の作品比較</a></li>
    <li><a href="016_ha_gyo_comparison.html">ハ行の作品比較</a></li>
    <li><a href="017_ma_gyo_comparison.html">マ行の作品比較</a></li>
    <li><a href="018_ya_gyo_comparison.html">ヤ行の作品比較</a></li>
    <li><a href="019_ra_gyo_comparison.html">ラ行の作品比較</a></li>
    <li><a href="020_wa_gyo_comparison.html">ワ行の作品比較</a></li>
  </ul>
  
<script>
const pageList = [
  { href: "011_a_gyo_comparison.html" },
  { href: "012_ka_gyo_comparison.html" },
  { href: "013_sa_gyo_comparison.html" },
  { href: "014_ta_gyo_comparison.html" },
  { href: "015_na_gyo_comparison.html" },
  { href: "016_ha_gyo_comparison.html" },
  { href: "017_ma_gyo_comparison.html" },
  { href: "018_ya_gyo_comparison.html" },
  { href: "019_ra_gyo_comparison.html" },
  { href: "020_wa_gyo_comparison.html" }
];

// 検索対象データ（作品ごとの行HTML）
let titleIndex = []; // { title, page, rowHTML }

async function buildTitleIndex() {
  titleIndex = [];
  for (const page of pageList) {
    try {
      const res = await fetch(page.href);
      if (!res.ok) continue;
      const html = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      // 各作品行（tr）を取得
      doc.querySelectorAll("tbody tr").forEach(tr => {
        const td = tr.querySelector("td");
        if (td) {
          const title = td.textContent.trim();
          if (title) {
            titleIndex.push({
              title: title,
              page: page.href,
              rowHTML: tr.outerHTML // 行全体を保存
            });
          }
        }
      });
    } catch (e) {
      console.warn("読み込み失敗:", page.href);
    }
  }
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  const exclude = document.getElementById('exclude-input').value.trim();
  const words = query ? query.split(/\s+/) : [];
  const excludes = exclude ? exclude.split(/\s+/) : [];

  if (titleIndex.length === 0) {
    document.getElementById('result-count').textContent = "検索中...";
    await buildTitleIndex();
  }

  const results = titleIndex.filter(item => {
    const match = words.every(w => item.title.includes(w));
    const notExcluded = excludes.every(w => !item.title.includes(w));
    return match && notExcluded;
  });

  // 表形式で結果を表示
  const resultTable = document.getElementById('search-result-table');
  const tbody = resultTable.querySelector('tbody');
  tbody.innerHTML = ''; // クリア

  results.forEach(item => {
    const parser = new DOMParser();
    const rowDoc = parser.parseFromString(item.rowHTML, "text/html");
    const tr = rowDoc.body.firstChild;
    tbody.appendChild(tr);
  });

  document.getElementById('result-count').textContent = results.length + "件ヒット";
}

// 検索イベント
document.getElementById('search-form').addEventListener('submit', doSearch);

// リセット処理
document.getElementById('reset-btn').addEventListener('click', function () {
  document.getElementById('search-input').value = '';
  document.getElementById('exclude-input').value = '';
  document.getElementById('result-count').textContent = '';
  document.querySelector('#search-result-table tbody').innerHTML = '';


  // 初期リンク一覧に戻す
  const ul = document.getElementById('result-list');
  ul.innerHTML = `
    <li><a href="011_a_gyo_comparison.html">ア行の作品比較</a></li>
    <li><a href="012_ka_gyo_comparison.html">カ行の作品比較</a></li>
    <li><a href="013_sa_gyo_comparison.html">サ行の作品比較</a></li>
    <li><a href="014_ta_gyo_comparison.html">タ行の作品比較</a></li>
    <li><a href="015_na_gyo_comparison.html">ナ行の作品比較</a></li>
    <li><a href="016_ha_gyo_comparison.html">ハ行の作品比較</a></li>
    <li><a href="017_ma_gyo_comparison.html">マ行の作品比較</a></li>
    <li><a href="018_ya_gyo_comparison.html">ヤ行の作品比較</a></li>
    <li><a href="019_ra_gyo_comparison.html">ラ行の作品比較</a></li>
    <li><a href="020_wa_gyo_comparison.html">ワ行の作品比較</a></li>
  `;
});
  </script>
</body>
</html>
